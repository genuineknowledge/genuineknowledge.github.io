<footer class="site-footer">
    <div class="container footer-container">
        <div class="footer-brand">
            <img src="{{ .Site.Params.logoFull }}" alt="{{ .Site.Params.brandName }}" class="footer-logo">
            <div class="logo-slogan footer-slogan">
                <span>符号连接融合</span>
                <span>大模型与智能体</span>
            </div>
            <p>{{ .Site.Params.siteDesc }}</p>
        </div>
        <div class="footer-links">
            <h4>导航</h4>
            {{ range .Site.Menus.main }}
            <a href="{{ .URL }}">{{ .Name }}</a>
            {{ end }}
        </div>
    </div>
    <div class="footer-bottom">
        <div class="container">
            <p>&copy; {{ now.Format "2006" }} {{ .Site.Params.companyName }}. All rights reserved.</p>
        </div>
    </div>
</footer>

<!-- 通用弹窗容器 -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal-box">
        <button class="modal-close" id="modalClose">×</button>
        <div class="modal-content" id="modalContent"></div>
    </div>
</div>
