<header class="site-header">
    <div class="header-container">
        <a href="{{ "/" | relURL }}" class="logo">
            <span class="logo-text">{{ .Site.Title }}</span>
        </a>
        <nav class="site-nav">
            <ul>
                {{ range .Site.Menus.main }}
                <li>
                    <a href="{{ .URL | relURL }}" 
                       class="{{ if $.IsMenuCurrent "main" . }}active{{ end }}">
                        {{ .Name }}
                    </a>
                </li>
                {{ end }}
            </ul>
        </nav>
    </div>
</header>
