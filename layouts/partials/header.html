<header class="site-header" id="siteHeader">
    <div class="container nav-container">
        <a href="/" class="logo-link">
            <img src="{{ .Site.Params.logoFull }}" alt="{{ .Site.Params.brandName }}" class="logo-full">
        </a>
        
        <nav class="main-nav">
            <ul class="nav-list">
                {{ range .Site.Menus.main }}
                <li class="nav-item">
                    <a href="{{ .URL }}" class="nav-link {{ if $.IsMenuCurrent "main" . }}active{{ end }}">
                        {{ .Name }}
                    </a>
                </li>
                {{ end }}
            </ul>
        </nav>

        <button class="menu-toggle" id="menuToggle" aria-label="菜单">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </div>

    <!-- 移动端侧边菜单 -->
    <div class="mobile-menu" id="mobileMenu">
        <ul class="mobile-nav-list">
            {{ range .Site.Menus.main }}
            <li><a href="{{ .URL }}" class="mobile-nav-link">{{ .Name }}</a></li>
            {{ end }}
        </ul>
    </div>
</header>
