{{ define "main" }}
<!-- 顶部滚动进度条 -->
<div class="product-progress" id="productProgress">
    <div class="progress-bar" id="progressBar"></div>
</div>

<div class="products-fullpage" id="productsFullpage">
    {{ range $index, $product := .Site.Data.products }}
    <section class="product-section section-animate" data-index="{{ $index }}">
        <div class="container product-container {{ if not (modBool $index 2) }}reverse{{ end }}">
            <div class="product-text">
                <span class="product-index">{{ .index }}</span>
                <h2 class="product-name">{{ .name }}</h2>
                <p class="product-desc">{{ .desc }}</p>
                <ul class="product-features">
                    {{ range .features }}
                    <li>
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="20 6 9 17 4 12"></polyline>
                        </svg>
                        {{ . }}
                    </li>
                    {{ end }}
                </ul>
                <div class="product-buttons">
                    <button class="btn btn-primary product-detail-btn" data-product="{{ .name }}">了解更多</button>
                    <button class="btn btn-outline">预约演示</button>
                </div>
            </div>
            <div class="product-image">
                <div class="product-img-wrapper">
                    <div class="product-glow"></div>
                    <img src="{{ .image }}" alt="{{ .name }}" class="product-img">
                </div>
            </div>
        </div>
    </section>
    {{ end }}
</div>

<!-- 右侧滚动指示器 -->
<div class="scroll-indicator" id="scrollIndicator">
    {{ range $index, $product := .Site.Data.products }}
    <span class="indicator-dot {{ if eq $index 0 }}active{{ end }}" data-target="{{ $index }}" title="{{ .name }}"></span>
    {{ end }}
</div>
{{ end }}
